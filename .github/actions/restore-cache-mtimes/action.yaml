name: "Optimize Cache & Restore Mtimes"
description: "Fixes Elixir CI caching by correctly handling submodules and explicitly caching deps"

runs:
  using: "composite"
  steps:
    - name: Fix Submodule mtimes instantly
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        git submodule foreach --recursive '
          commit_time=$(git log -1 --format=%cI)
          find . -exec touch -d "$commit_time" {} + || true
        '

    - name: Explicitly Cache Mix Deps
      uses: actions/cache@v4
      with:
        path: backend/deps
        key: mix-deps-${{ runner.os }}-${{ hashFiles('backend/mix.lock') }}
        restore-keys: |
          mix-deps-${{ runner.os }}-
